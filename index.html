<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STYX — Conversation Log Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
            background: #0a0f1e;
            color: #f1f5f9;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 2rem;
            padding: 1rem 2rem;
            background: #0d1426;
            border-bottom: 1px solid #1e293b;
        }
        
        .stat {
            display: flex;
            flex-direction: column;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #94a3b8;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        /* Main Layout */
        .main {
            display: flex;
            height: calc(100vh - 80px);
        }
        
        /* Left Panel - Sessions */
        .sessions-panel {
            width: 300px;
            background: #0d1426;
            border-right: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
        }
        
        .panel-header {
            padding: 1rem;
            border-bottom: 1px solid #1e293b;
        }
        
        .panel-title {
            font-size: 0.875rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }
        
        .filter-buttons {
            display: flex;
            gap: 0.5rem;
        }
        
        .filter-btn {
            flex: 1;
            padding: 0.375rem 0.5rem;
            background: #1e293b;
            border: none;
            border-radius: 4px;
            color: #94a3b8;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: #334155;
            color: #f1f5f9;
        }
        
        .search-box {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #1e293b;
        }
        
        .search-input {
            width: 100%;
            padding: 0.5rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 4px;
            color: #f1f5f9;
            font-family: inherit;
            font-size: 0.875rem;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #475569;
        }
        
        .sessions-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .session-item {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #1e293b;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .session-item:hover, .session-item.selected {
            background: #1e293b;
        }
        
        .session-time {
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 0.25rem;
        }
        
        .session-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .quality-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        
        .quality-good { background: #22c55e; }
        .quality-warn { background: #eab308; }
        .quality-bad { background: #ef4444; }
        
        .session-turns {
            font-size: 0.75rem;
            color: #94a3b8;
        }
        
        /* Middle Panel - Turns */
        .turns-panel {
            flex: 1;
            background: #0a0f1e;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .turns-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        
        .turn-item {
            padding: 1rem;
            background: #0d1426;
            border-radius: 8px;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #1e293b;
        }
        
        .turn-item:hover, .turn-item.selected {
            border-color: #475569;
            background: #111827;
        }
        
        .turn-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }
        
        .turn-number {
            font-size: 0.75rem;
            color: #64748b;
        }
        
        .tool-badge {
            padding: 0.25rem 0.5rem;
            background: #1e293b;
            border-radius: 4px;
            font-size: 0.75rem;
            color: #94a3b8;
        }
        
        .turn-duration {
            margin-left: auto;
            font-size: 0.75rem;
            color: #64748b;
        }
        
        .turn-message {
            font-style: italic;
            color: #94a3b8;
            font-size: 0.875rem;
            line-height: 1.5;
        }
        
        .turn-error {
            margin-top: 0.5rem;
            padding: 0.5rem;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 4px;
            font-size: 0.75rem;
            color: #ef4444;
        }
        
        /* Right Panel - Turn Detail */
        .detail-panel {
            width: 400px;
            background: #0d1426;
            border-left: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s;
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            z-index: 10;
        }
        
        .detail-panel.open {
            transform: translateX(0);
        }
        
        .detail-header {
            padding: 1rem;
            border-bottom: 1px solid #1e293b;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .close-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .detail-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        
        .detail-section {
            margin-bottom: 1.5rem;
        }
        
        .detail-label {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        
        .detail-value {
            font-size: 0.875rem;
            color: #f1f5f9;
            line-height: 1.6;
        }
        
        .detail-value pre {
            background: #1e293b;
            padding: 0.75rem;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 0.75rem;
            color: #94a3b8;
        }
        
        .detail-value.error {
            color: #ef4444;
        }
        
        .detail-value.success {
            color: #22c55e;
        }
        
        /* Error State */
        .error-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #64748b;
        }
        
        .error-state h2 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            color: #94a3b8;
        }
        
        .retry-btn {
            padding: 0.75rem 1.5rem;
            background: #1e293b;
            border: none;
            border-radius: 4px;
            color: #f1f5f9;
            cursor: pointer;
            font-family: inherit;
        }
        
        .retry-btn:hover {
            background: #334155;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #0a0f1e;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
        
        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #64748b;
        }
        
        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid #1e293b;
            border-top-color: #475569;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Stats Bar -->
    <div class="stats-bar">
        <div class="stat">
            <div class="stat-value" id="stat-sessions">-</div>
            <div class="stat-label">Sessions Today</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="stat-turns">-</div>
            <div class="stat-label">Turns Today</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="stat-failures">-</div>
            <div class="stat-label">Failures Today</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="stat-avg-time">-</div>
            <div class="stat-label">Avg Response</div>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="main">
        <!-- Left Panel: Sessions -->
        <div class="sessions-panel">
            <div class="panel-header">
                <div class="panel-title">Sessions</div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">ALL</button>
                    <button class="filter-btn" data-filter="good">GOOD</button>
                    <button class="filter-btn" data-filter="warn">WARN</button>
                    <button class="filter-btn" data-filter="bad">FAIL</button>
                </div>
            </div>
            <div class="search-box">
                <input type="text" class="search-input" placeholder="Search sessions..." id="search-input">
            </div>
            <div class="sessions-list" id="sessions-list">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
        
        <!-- Middle Panel: Turns -->
        <div class="turns-panel">
            <div class="panel-header" style="border-bottom: 1px solid #1e293b;">
                <div class="panel-title" id="turns-panel-title">Select a session</div>
            </div>
            <div class="turns-list" id="turns-list">
                <div class="error-state">
                    <h2>No session selected</h2>
                    <p>Click on a session to view its turns</p>
                </div>
            </div>
        </div>
        
        <!-- Right Panel: Turn Detail -->
        <div class="detail-panel" id="detail-panel">
            <div class="detail-header">
                <div class="panel-title">Turn Details</div>
                <button class="close-btn" onclick="closeDetail()">&times;</button>
            </div>
            <div class="detail-content" id="detail-content">
                <!-- Filled dynamically -->
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://192.168.2.23:8080/api';
        let sessions = [];
        let selectedSession = null;
        let selectedTurn = null;
        let currentFilter = 'all';
        let refreshInterval;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadSessions();
            setupFilters();
            setupSearch();
            // Auto-refresh every 30 seconds
            refreshInterval = setInterval(loadSessions, 30000);
        });
        
        // Setup filter buttons
        function setupFilters() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderSessions();
                });
            });
        }
        
        // Setup search
        function setupSearch() {
            document.getElementById('search-input').addEventListener('input', (e) => {
                renderSessions();
            });
        }
        
        // Load sessions from API
        async function loadSessions() {
            try {
                const response = await fetch(`${API_BASE}/conversations?limit=100`);
                const data = await response.json();
                
                if (data.error) {
                    showError(data.error);
                    return;
                }
                
                sessions = data.sessions || [];
                updateStats(data);
                renderSessions();
            } catch (error) {
                showError('Cannot connect to ARGUS');
            }
        }
        
        // Update stats bar
        function updateStats(data) {
            document.getElementById('stat-sessions').textContent = data.sessions?.length || 0;
            document.getElementById('stat-turns').textContent = data.turns_today ?? '-';
            document.getElementById('stat-failures').textContent = data.bad_today || 0;
            document.getElementById('stat-avg-time').textContent = data.avg_response_time ? `${data.avg_response_time}s` : '-';
        }
        
        // Show error state
        function showError(message) {
            const list = document.getElementById('sessions-list');
            list.innerHTML = `
                <div class="error-state">
                    <h2>${message}</h2>
                    <button class="retry-btn" onclick="loadSessions()">Retry</button>
                </div>
            `;
        }
        
        // Render sessions list
        function renderSessions() {
            const list = document.getElementById('sessions-list');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            
            let filtered = sessions;
            
            // Apply quality filter
            if (currentFilter !== 'all') {
                filtered = filtered.filter(s => {
                    if (currentFilter === 'good') return s.quality_score === 'good';
                    if (currentFilter === 'warn') return s.quality_score === 'warn';
                    if (currentFilter === 'bad') return s.quality_score === 'bad';
                    return true;
                });
            }
            
            // Apply search filter
            if (searchTerm) {
                filtered = filtered.filter(s => 
                    s.chat_id?.toLowerCase().includes(searchTerm) ||
                    s.session_id?.toLowerCase().includes(searchTerm)
                );
            }
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="error-state"><p>No sessions found</p></div>';
                return;
            }
            
            list.innerHTML = filtered.map(session => {
                const qualityClass = session.quality_score === 'good' ? 'quality-good' :
                                    session.quality_score === 'warn' ? 'quality-warn' : 'quality-bad';
                const time = new Date(session.started_at).toLocaleString();
                const isSelected = selectedSession?.session_id === session.session_id;
                
                return `
                    <div class="session-item ${isSelected ? 'selected' : ''}" 
                         onclick="selectSession('${session.session_id}')">
                        <div class="session-time">${time}</div>
                        <div class="session-info">
                            <div class="quality-dot ${qualityClass}"></div>
                            <div class="session-turns">${session.turn_count || 0} turns</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Select session and load turns
        async function selectSession(sessionId) {
            selectedSession = sessions.find(s => s.session_id === sessionId);
            selectedTurn = null;
            renderSessions();
            
            const turnsList = document.getElementById('turns-list');
            const title = document.getElementById('turns-panel-title');
            
            title.textContent = `Session ${sessionId.slice(-8)}`;
            turnsList.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            try {
                const response = await fetch(`${API_BASE}/conversations/${sessionId}`);
                const data = await response.json();
                
                if (data.error) {
                    turnsList.innerHTML = `<div class="error-state"><p>${data.error}</p></div>`;
                    return;
                }
                
                renderTurns(data.turns || []);
            } catch (error) {
                turnsList.innerHTML = '<div class="error-state"><p>Failed to load turns</p></div>';
            }
        }
        
        // Render turns list
        function renderTurns(turns) {
            const list = document.getElementById('turns-list');
            
            if (turns.length === 0) {
                list.innerHTML = '<div class="error-state"><p>No turns in this session</p></div>';
                return;
            }
            
            list.innerHTML = turns.map((turn, index) => {
                const qualityClass = turn.quality === 'good' ? 'quality-good' :
                                    turn.quality === 'warn' ? 'quality-warn' : 'quality-bad';
                const time = new Date(turn.timestamp).toLocaleTimeString();
                const isSelected = selectedTurn?.id === turn.id;
                
                return `
                    <div class="turn-item ${isSelected ? 'selected' : ''}" 
                         onclick="selectTurn(${turn.id})">
                        <div class="turn-header">
                            <span class="turn-number">#${turn.turn_number}</span>
                            <span class="tool-badge">${turn.tool_selected || 'No tool'}</span>
                            <span class="turn-duration">${turn.duration_seconds?.toFixed(1) || '-'}s</span>
                            <div class="quality-dot ${qualityClass}"></div>
                        </div>
                        <div class="turn-message">${escapeHtml(turn.user_message || 'No message')}</div>
                        ${turn.error ? `<div class="turn-error">${escapeHtml(turn.error)}</div>` : ''}
                    </div>
                `;
            }).join('');
        }
        
        // Select turn and show detail
        function selectTurn(turnId) {
            const session = selectedSession;
            if (!session) return;
            
            // Find turn in rendered list (we'd need to fetch full session data)
            // For now, just show the panel
            selectedTurn = { id: turnId };
            renderTurns([]); // Re-render to show selection
            
            // Fetch full session data for detail
            fetch(`${API_BASE}/conversations/${session.session_id}`)
                .then(r => r.json())
                .then(data => {
                    const turn = data.turns?.find(t => t.id === turnId);
                    if (turn) {
                        showTurnDetail(turn);
                    }
                });
        }
        
        // Show turn detail panel
        function showTurnDetail(turn) {
            const panel = document.getElementById('detail-panel');
            const content = document.getElementById('detail-content');

            content.innerHTML = `
                <div class="detail-section">
                    <div class="detail-label">User Message</div>
                    <div class="detail-value" style="font-style: italic;">${escapeHtml(turn.user_message || 'N/A')}</div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">Tool Selected</div>
                    <div class="detail-value">${turn.tool_selected || 'None'}</div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">Tool Params</div>
                    <div class="detail-value"><pre>${formatJson(turn.tool_params)}</pre></div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">Tool Result</div>
                    <div class="detail-value ${turn.tool_result_success ? 'success' : 'error'}">
                        ${turn.tool_result_success ? '✅ Success' : '❌ Failed'}
                    </div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">Result Summary</div>
                    <div class="detail-value"><pre>${escapeHtml(turn.tool_result_summary || 'N/A')}</pre></div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">Final Response</div>
                    <div class="detail-value"><pre>${escapeHtml(turn.final_response || 'N/A')}</pre></div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">Duration</div>
                    <div class="detail-value">${turn.duration_seconds?.toFixed(2) || '-'}s</div>
                </div>
                ${turn.used_second_pass ? `
                <div class="detail-section">
                    <div class="detail-label">Second Pass</div>
                    <div class="detail-value">Yes</div>
                </div>
                ` : ''}
                ${turn.error ? `
                <div class="detail-section">
                    <div class="detail-label">Error</div>
                    <div class="detail-value error">${escapeHtml(turn.error)}</div>
                </div>
                ` : ''}
                <div class="detail-section">
                    <div class="detail-label">Quality</div>
                    <div class="detail-value">
                        <span class="quality-dot ${turn.quality === 'good' ? 'quality-good' : turn.quality === 'warn' ? 'quality-warn' : 'quality-bad'}"></span>
                        ${turn.quality || 'N/A'}
                    </div>
                </div>
                <hr style="border-color: #1e293b; margin: 1.5rem 0;">
                <div class="detail-section">
                    <div class="detail-label" style="color: #f59e0b;">Failure Diagnostics</div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">LLM Raw Response (first 300 chars)</div>
                    <div class="detail-value"><pre>${escapeHtml(turn.llm_raw_response || 'N/A')}</pre></div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">Failure Stage</div>
                    <div class="detail-value ${turn.failure_stage ? 'error' : ''}">${turn.failure_stage || 'None'}</div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">LLM Error Code</div>
                    <div class="detail-value ${turn.llm_error_code ? 'error' : ''}">${escapeHtml(turn.llm_error_code || 'None')}</div>
                </div>
            `;

            panel.classList.add('open');
        }
        
        // Close detail panel
        function closeDetail() {
            document.getElementById('detail-panel').classList.remove('open');
        }
        
        // Utility: Escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Utility: Format JSON
        function formatJson(text) {
            if (!text) return '{}';
            try {
                return JSON.stringify(JSON.parse(text), null, 2);
            } catch {
                return text;
            }
        }
    </script>
</body>
</html>
